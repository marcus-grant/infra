---
- hosts: workstation
  gather_facts: true
  pre_tasks:
    - name: Prompt for GPG passphrase
      ansible.builtin.pause:
        prompt: "GPG passphrase for key transfer (empty to skip)"
        echo: false
      register: _gpg_passphrase_prompt
      tags: [gpg_transfer]
    - name: Set GPG passphrase fact
      ansible.builtin.set_fact:
        gpg_transfer_passphrase: "{{ _gpg_passphrase_prompt.user_input }}"
      when: _gpg_passphrase_prompt.user_input | default('') | length > 0
      no_log: true
      tags: [gpg_transfer]
    - name: Full system sync and upgrade (Arch)
      community.general.pacman:
        update_cache: true
        upgrade: true
      become: true
      when: ansible_os_family == 'Archlinux'
      tags: always
  roles:
    - role: marcus_grant.dotfiles.ssh_transfer_key
      tags: [ssh_transfer_key, ssh, key, security, deploy]
    - role: marcus_grant.dotfiles.ssh_keygen
      tags: [ssh_keygen, ssh, key, keygen, security, deploy]
    - role: marcus_grant.dotfiles.ssh_config
      tags: [ssh_config, ssh, config, security, deploy]
    - role: marcus_grant.dotfiles.git
      tags: [git, dev, deploy, shell, git_dotfile]
    - role: marcus_grant.dotfiles.profile
      tags: [profile, dotfile, shell, user, env]
    - role: marcus_grant.dotfiles.userdirs
      tags: [profile, dotfile, shell, user, env, xdg]
    - role: marcus_grant.dotfiles.gpg_transfer
      tags: [gpg_transfer, gpg, password, security, deploy]
    - role: marcus_grant.dotfiles.zsh
      tags: [zsh, shell, dotfile, env]
    - role: marcus_grant.dotfiles.neovim
      tags: [neovim, dotfile, shell, dev, editor]
    - role: marcus_grant.dotfiles.pyenv
      tags: [pyenv, python, dotfile, dev, env, install, deploy]
    - role: marcus_grant.dotfiles.pip
      tags: [pip, python, pipx, poetry, dev, dotfile, env]
    - role: marcus_grant.dotfiles.uv
      tags: [uv, python, dev, dotfile, env]
    - role: marcus_grant.gui.nerd_fonts
      tags: [nerd_fonts, font, gui]
