---
##################
### User / Env ###
##################
admin_user_group: sudo # Used for group permissions

### SSH
# SSH Keys - Copies from controller to remote
ssh_keys_owner: marcus
ssh_keys_pairs: [{ src: ~/.ssh/git.key }]
# SSH Config - Templates config entreis for remote
ssh_config_owner: marcus
ssh_config_common_entries: # Atomic configs appended from all
  - "{{ ssh_config_entry_github }}"
  - "{{ ssh_config_entry_codeberg }}"
  - "{{ ssh_config_entry_gitlab }}"

### Profile
profile_user: "{{ admin_user }}"
profile_group: "{{ admin_user }}"
profile_paths: ["$HOME/.local/bin"]
profile_custom_entries:
  - "export PASSWORD_STORE_DIR={{ secrets_path }}/pass"
  - "{{ '#' }} Secrets"
  - "export EMAIL='{{ admin_email }}'"

### ZSH
zsh_owner: marcus
zsh_config_dest: ~/.config/zsh
zsh_git_repo: git@github.com:marcus-grant/dots-zsh.git
zsh_rc_file: rc.zsh
zsh_profile_file: profile.zsh
zsh_env_file: env.zsh
zsh_env_source_profile: true
zsh_shell_as_default: true

### Neovim
neovim_owner: marcus
neovim_git_repo: git@github.com:marcus-grant/lazyvim.git
neovim_git_version: main
# NOTE: Required by nvim-treesitter main branch for parser compilation
# See: https://github.com/nvim-treesitter/nvim-treesitter/issues/8636
neovim_extra_packages: [tree-sitter-cli]

### Git
git_owner: marcus
git_default_branch: main
git_user_name: Marcus Grant
git_user_email: "{{ admin_email }}"
git_pull_rebase: false

### Bash
dotfiles_bash_repo: git@github.com:marcus-grant/dots-bash
bash_set_default_shell: false
dotfiles_bash_git_force: false

### Vim
vim_git_repo: git@github.com:marcus-grant/dots-vim

### TMux
tmux_git_repo: git@github.com:marcus-grant/dots-tmux

###########
### Dev ###
###########

# PyEnv
pyenv_root: "$HOME/.local/share/pyenv"
pyenv_versions: ["3.9.21", "3.11.11", "3.12.8"]
pyenv_version_global: "3.12.8" # NOTE: This must match one of the versions
# FIXME: Delete this if new pyenv detection of profile_d_path works
# pyenv_profile_d_path: "{{ profile_d_path }}"

# pip
pip_packages_common: [python-dotenv, numpy, pandas, matplotlib, seaborn]
pip_packages_global:
  [pipx, poetry, jupyter, numpy, pandas, matplotlib, flask, django]

###########
### GUI ###
###########
### Nerdfonts
nerd_fonts_dicts:
  - name: FiraCode
    file: FiraCode.zip
    url: "https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/FiraCode.zip"
  - name: Iosevka
    file: IosevkaTerm.zip
    url: "https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/IosevkaTerm.zip"
  - name: BigBlue
    file: BigBlueTerminal.zip
    url: "https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/BigBlueTerminal.zip"

### Flatpak
flatpak_install_gnome_software: true
flatpak_user_flatpaks:
  - org.freecadweb.FreeCAD
  - org.mozilla.firefox
  - com.discordapp.Discord
  - com.mojang.Minecraft
  - org.libretro.RetroArch
  - com.spotify.Client
  - com.usebottles.bottles
  - org.chromium.Chromium
  - com.github.liferooter.textpieces
